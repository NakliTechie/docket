# One-command sovereign deployment: app + Postgres on your own
# hardware. Defaults are production-safe: no demo accounts, SSL enforced,
# and a unique SECRET_KEY_BASE generated on first boot.
#
#   # Production (put a TLS-terminating proxy in front):
#   POSTGRES_PASSWORD=$(openssl rand -hex 16) docker compose up --build -d
#
#   # Try the demo on localhost (seeds fictional data, serves plain HTTP):
#   DOCKET_SEED_DEMO=true DOCKET_FORCE_SSL=false docker compose up --build
#
# then open http://localhost:3000 (staff console) and /portal. In demo
# mode the demo logins (arjun@docket.local / docket-demo) print on first
# boot. The break-glass admin (admin@docket.local) gets a random password
# printed once unless you set DOCKET_ADMIN_PASSWORD.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: docket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docket}
      POSTGRES_DB: docket_production
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init/create-databases.sql:/docker-entrypoint-initdb.d/10-create-databases.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docket -d docket_production" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${DOCKET_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://docket:${POSTGRES_PASSWORD:-docket}@db/docket_production
      # Left unset, the entrypoint generates a unique key and persists it
      # to the storage volume. Override to manage it yourself: bin/rails secret
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      # Production-safe defaults: SSL enforced, no demo accounts. The
      # localhost demo overrides both (see the header comment).
      DOCKET_FORCE_SSL: "${DOCKET_FORCE_SSL:-true}"
      DOCKET_SEED_DEMO: "${DOCKET_SEED_DEMO:-false}"
      DOCKET_HOST: ${DOCKET_HOST:-localhost}
      DOCKET_PORT: ${DOCKET_PORT:-3000}
      # Outbound mail stays off unless you configure your gateway:
      # SMTP_ADDRESS, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
      SOLID_QUEUE_IN_PUMA: "true"
    volumes:
      - app-storage:/rails/storage
    # /up returns 200 once the app boots cleanly. assume_ssl makes Rails
    # treat this in-container http probe as already-SSL, so force_ssl
    # doesn't redirect it (works in both the prod and demo profiles).
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:3000/up || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  postgres-data:
  app-storage:
