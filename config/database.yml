# SQLite for development/test/demo (zero dependencies); Postgres in
# production (compose: app + Postgres). Solid Queue/Cache/Cable get
# their own databases in both worlds.
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary: &production_primary
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *production_primary
    url: <%= ENV.fetch("CACHE_DATABASE_URL") { "#{ENV["DATABASE_URL"]}_cache" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_primary
    url: <%= ENV.fetch("QUEUE_DATABASE_URL") { "#{ENV["DATABASE_URL"]}_queue" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_primary
    url: <%= ENV.fetch("CABLE_DATABASE_URL") { "#{ENV["DATABASE_URL"]}_cable" } %>
    migrations_paths: db/cable_migrate
