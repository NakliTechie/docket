shared: &shared
  sla_breach_sweep:
    class: SlaBreachSweepJob
    queue: default
    schedule: every 5 minutes
  sequence_runner:
    class: SequenceRunnerJob
    queue: default
    schedule: every hour at minute 5
  session_sweep:
    class: SessionSweepJob
    queue: default
    schedule: every hour at minute 20
  connector_scheduler:
    class: ConnectorSchedulerJob
    queue: default
    schedule: every 5 minutes

development:
  <<: *shared

production:
  <<: *shared
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
